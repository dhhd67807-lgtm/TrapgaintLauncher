name: Android CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  BuildRelease:
    if: ${{ !startsWith(github.ref, 'refs/pull/') && github.ref_name == 'main' }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm", "arm64", "x86", "x86_64" ]
      fail-fast: false

    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build type
        id: set-env
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          BUILD_TYPE="DEBUG"

          if [[ "$COMMIT_MSG" == *"pre-release"* ]]; then
            BUILD_TYPE="PRE_RELEASE"
          elif [[ "$COMMIT_MSG" == *"release"* ]]; then
            BUILD_TYPE="RELEASE"
          fi

          echo "ZL_BUILD_TYPE=${BUILD_TYPE}" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          mkdir out
          ./gradlew jre_lwjgl3glfw:build --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Build Release ${{ matrix.arch }}
        env:
          MOVTERY_KEYSTORE_PASSWORD: ${{ secrets.MOVTERY_KEYSTORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assemblerelease -Darch=${{ matrix.arch }} -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Upload Release ${{matrix.arch}}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher(Release) ${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/release/*

  PublishRelease:
    if: ${{ !startsWith(github.ref, 'refs/pull/') && github.ref_name == 'main' }}
    needs: BuildRelease
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Resolve release metadata
        id: metadata
        run: |
          VERSION_CODE="$(grep '^launcher_version_code=' ZalithLauncher/gradle.properties | cut -d'=' -f2)"
          VERSION_NAME="$(grep '^launcher_version_name=' ZalithLauncher/gradle.properties | cut -d'=' -f2)"

          COMMIT_MSG="${{ github.event.head_commit.message }}"
          IS_PRERELEASE="false"
          MAKE_LATEST="true"
          if [[ "$COMMIT_MSG" == *"pre-release"* ]]; then
            IS_PRERELEASE="true"
            MAKE_LATEST="false"
          fi

          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "make_latest=$MAKE_LATEST" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.version_code }}
          name: Trapgaint ${{ steps.metadata.outputs.version_name }}
          prerelease: ${{ steps.metadata.outputs.is_prerelease }}
          make_latest: ${{ steps.metadata.outputs.make_latest }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/**/*.apk

  BuildDebug:
    if: ${{ startsWith(github.ref, 'refs/pull/') || github.ref_name != 'main' }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [ "all", "arm", "arm64", "x86", "x86_64" ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build JRE JAR files
        run: |
          chmod +x gradlew
          mkdir out
          ./gradlew jre_lwjgl3glfw:build --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Build Debug ${{matrix.arch}}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assembleDebug -Darch=${{ matrix.arch }} -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Upload Debug ${{matrix.arch}}
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher(Debug) ${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/debug/*
